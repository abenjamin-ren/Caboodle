id: "03-cta-inventory"
title: "CTA Inventory"
orca_round: discovery
orca_pillar: ctas
orca_step: 3
version: "3.0.0"
description: >
  Identify all Calls-to-Action for each validated object. Categorize CTAs
  as creation, read/view, update, delete, or custom actions. Produces a
  comprehensive CTA list organized by object.
roles:
  - ux-designer
  - product-manager
  - engineer
difficulty: beginner
estimated_duration_minutes: 45
tags:
  - discovery
  - ctas
  - actions

sources:
  reads_from_site:
    - description: "Read validated objects and NOM from project"
      path: "projects/"
      glob: "projects/{project_name}/*.md"
    - description: "Read existing Object Guides for CTA context"
      path: "objects/"
      glob: "objects/*.md"
  accepts_from_user:
    - type: text
      description: "User stories, acceptance criteria, feature descriptions"
      required: false
    - type: file
      description: "PRDs, requirements docs describing user actions"
      required: false

publishing:
  output_dir: "projects/{project_name}/"
  filename_template: "cta-inventory.md"
  frontmatter:
    title_template: "CTA Inventory: {project_name}"
    tags: [ctas, discovery]
  update_existing: true

collaboration_checkpoints:
  - id: "object-selection"
    prompt: "Which objects are we inventorying CTAs for? All of them, or a subset?"
    type: user-review
    required: true
  - id: "cta-draft"
    prompt: "Here are the CTAs I identified for each object. Did I miss any? Are any wrong?"
    type: user-review
    required: true
  - id: "role-mapping"
    prompt: "Which user roles can perform each CTA? Let's walk through the permissions."
    type: user-input
    required: true
  - id: "final-inventory"
    prompt: "Here's the complete CTA inventory. Ready to save?"
    type: user-confirm
    required: true

inputs:
  - name: Validated Object List
    description: "Objects from Object Discovery"
    required: true
  - name: NOM
    description: "Nesting context from NOM Builder"
    required: false

outputs:
  - name: CTA Inventory
    description: "Complete list of CTAs per object with role mappings"
    artifact_type: page

procedure:
  - step: 1
    title: "Load Project Context"
    instructions: "Read object discovery and NOM files. Identify all objects."
    timebox_minutes: 5
  - step: 2
    title: "Inventory CTAs per Object"
    instructions: >
      For each object, ask: What can users DO with this thing?
      Start with CRUD (Create, Read, Update, Delete) then go beyond.
    checkpoint: "cta-draft"
    timebox_minutes: 20
  - step: 3
    title: "Map Roles to CTAs"
    instructions: "For each CTA, determine which user roles can perform it."
    checkpoint: "role-mapping"
    timebox_minutes: 15
  - step: 4
    title: "Save Inventory"
    instructions: "Present final inventory and save to resource site."
    checkpoint: "final-inventory"
    timebox_minutes: 5

definition_of_done:
  - "Every object has at least one CTA"
  - "CTAs go beyond basic CRUD where applicable"
  - "Role-to-CTA mapping is defined"
  - "CTA inventory is saved to the resource site"

system_prompt_file: SKILL.md
