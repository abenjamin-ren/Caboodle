id: "06-relationship-lens"
title: "Relationship Lens"
orca_round: definition
orca_pillar: relationships
orca_step: 6
version: "3.0.0"
description: >
  Analyze object relationships through five lenses: Mechanics (how objects
  connect), Cardinality (one-to-many, many-to-many), Sorts (default ordering),
  Filters (how users narrow down), and Dependency (what breaks if deleted).
roles:
  - ux-designer
  - product-manager
  - engineer
difficulty: intermediate
estimated_duration_minutes: 60
tags:
  - definition
  - relationships
  - mcsfd
  - cardinality

sources:
  reads_from_site:
    - description: "Read project NOM and object discovery"
      path: "projects/"
      glob: "projects/{project_name}/*.md"
    - description: "Read Object Guides"
      path: "objects/"
      glob: "objects/*.md"
  accepts_from_user:
    - type: text
      description: "Business rules about relationships, edge cases"
      required: false

publishing:
  output_dir: "projects/{project_name}/"
  filename_template: "relationship-lens.md"
  frontmatter:
    title_template: "Relationship Lens: {project_name}"
    tags: [relationships, mcsfd]
  update_existing: true

collaboration_checkpoints:
  - id: "pair-selection"
    prompt: "Which object pairs should we analyze? All from the NOM, or specific ones?"
    type: user-review
    required: true
  - id: "mechanics-review"
    prompt: "Here's how I think these objects connect mechanically. Does this match your understanding?"
    type: user-review
    required: true
  - id: "cardinality-review"
    prompt: "Here are the cardinality rules. Are there any caps or constraints I should know about?"
    type: user-input
    required: true
  - id: "dependency-review"
    prompt: "Here's the dependency analysis - what happens when objects are deleted. Any cascade rules to adjust?"
    type: user-review
    required: true
  - id: "final-lens"
    prompt: "Here's the complete relationship analysis. Ready to save?"
    type: user-confirm
    required: true

inputs:
  - name: Object List and NOM
    description: "Validated objects and nesting from discovery"
    required: true

outputs:
  - name: Relationship Lens Analysis
    description: "Complete MCSFD analysis for all object pairs"
    artifact_type: page

system_prompt_file: SKILL.md
