id: "15-interaction-spec"
title: "Interaction Spec"
orca_round: build
orca_pillar: ctas
orca_step: 15
version: "3.0.0"
description: >
  Define detailed interaction specifications for each CTA - trigger,
  flow, validation, feedback, error states, and edge cases. Bridges
  design and engineering with implementation-ready specs.
roles:
  - ux-designer
  - engineer
difficulty: advanced
estimated_duration_minutes: 45
tags:
  - build
  - ctas
  - interaction-design
  - specs

sources:
  reads_from_site:
    - description: "Read CTA prioritization and all project artifacts"
      path: "projects/"
      glob: "projects/{project_name}/*.md"
    - description: "Read Object Guides"
      path: "objects/"
      glob: "objects/*.md"
  accepts_from_user:
    - type: text
      description: "Design system constraints, technical requirements"
      required: false
    - type: image
      description: "UI mockups, wireframes for the interaction"
      required: false

publishing:
  output_dir: "projects/{project_name}/"
  filename_template: "interaction-specs.md"
  frontmatter:
    title_template: "Interaction Specs: {project_name}"
    tags: [interaction, specs, build]
  update_existing: true

collaboration_checkpoints:
  - id: "cta-focus"
    prompt: "Which CTAs should we spec out? I'd suggest starting with P1 (must-have) actions."
    type: user-input
    required: true
  - id: "spec-draft"
    prompt: "Here's the interaction spec for {cta}. Does this flow match your vision?"
    type: user-review
    required: true
  - id: "error-states"
    prompt: "What error states and edge cases should we handle for this interaction?"
    type: user-input
    required: true
  - id: "final-specs"
    prompt: "Here are all the interaction specs. Ready to save?"
    type: user-confirm
    required: true

inputs:
  - name: Prioritized CTAs
    description: "Priority-ranked CTAs from step 11"
    required: true

outputs:
  - name: Interaction Specs
    description: "Detailed interaction specifications for each CTA"
    artifact_type: page

system_prompt_file: SKILL.md
