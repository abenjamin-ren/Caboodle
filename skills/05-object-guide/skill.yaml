id: "05-object-guide"
title: "Object Guide"
orca_round: definition
orca_pillar: objects
orca_step: 5
version: "3.0.0"
description: >
  Create a comprehensive Object Guide — a "glossary on steroids" — for a
  single system object. Combines discovery artifacts with deep analysis
  including purpose, instances, attributes, CTAs, relationships, edge cases,
  and governance rules.
roles:
  - ux-designer
  - product-manager
  - engineer
difficulty: intermediate
estimated_duration_minutes: 60
tags:
  - definition
  - objects
  - object-guide
  - documentation

sources:
  reads_from_site:
    - description: "Read all project artifacts"
      path: "projects/"
      glob: "projects/{project_name}/*.md"
    - description: "Read existing Object Guides"
      path: "objects/"
      glob: "objects/*.md"
  accepts_from_user:
    - type: text
      description: "Additional domain knowledge, business rules, edge cases"
      required: false
    - type: image
      description: "UI screenshots showing the object in the wild"
      required: false

publishing:
  output_dir: "objects/"
  filename_template: "{object_name}.md"
  frontmatter:
    title_template: "Object Guide: {object_name}"
    tags: [object-guide]
  update_existing: true

collaboration_checkpoints:
  - id: "object-selection"
    prompt: "Which object should we create/update a guide for?"
    type: user-input
    required: true
  - id: "purpose-statement"
    prompt: "Here's a draft purpose statement for {object}. Does this capture why it exists and who it serves?"
    type: user-review
    required: true
  - id: "completeness"
    prompt: "Here's the full draft guide. Is anything missing? Any sections need more detail?"
    type: user-review
    required: true
  - id: "publish"
    prompt: "Ready to publish this Object Guide to the resource site?"
    type: user-confirm
    required: true

inputs:
  - name: Object Name
    description: "The object to create a guide for"
    required: true
  - name: Project Artifacts
    description: "Existing discovery work with this object"
    required: false

outputs:
  - name: Object Guide
    description: "Comprehensive guide for a single system object"
    artifact_type: page

procedure:
  - step: 1
    title: "Gather Context"
    instructions: "Read project artifacts and existing guides. Compile everything known about this object."
    timebox_minutes: 10
  - step: 2
    title: "Draft Guide"
    instructions: >
      Create a comprehensive guide covering: purpose, definition, instances,
      attributes, CTAs, relationships, edge cases, lifecycle, and governance.
    checkpoint: "purpose-statement"
    timebox_minutes: 25
  - step: 3
    title: "Review and Refine"
    instructions: "Present the full guide to the user for feedback."
    checkpoint: "completeness"
    timebox_minutes: 15
  - step: 4
    title: "Publish"
    instructions: "Save the Object Guide to the objects directory."
    checkpoint: "publish"
    timebox_minutes: 5

definition_of_done:
  - "Guide includes all required sections"
  - "Purpose statement clearly explains why the object exists"
  - "At least 3 concrete instances listed"
  - "All attributes defined with types"
  - "Key CTAs documented"
  - "Relationships to other objects noted"
  - "Guide is published to the resource site"

system_prompt_file: SKILL.md
