id: "02-nom-builder"
title: "Nested Object Matrix (NOM) Builder"
orca_round: discovery
orca_pillar: relationships
orca_step: 2
version: "3.0.0"
description: >
  Build a Nested Object Matrix showing which objects contain or are contained
  by other objects. Uses the validated object list from Object Discovery and
  collaboratively maps nesting relationships.
roles:
  - ux-designer
  - product-manager
  - engineer
difficulty: beginner
estimated_duration_minutes: 45
tags:
  - discovery
  - relationships
  - nom
  - nesting

sources:
  reads_from_site:
    - description: "Read validated object list from project"
      path: "projects/"
      glob: "projects/{project_name}/object-discovery.md"
    - description: "Read existing Object Guides for relationship context"
      path: "objects/"
      glob: "objects/*.md"
  accepts_from_user:
    - type: text
      description: "Additional context about object relationships"
      required: false

publishing:
  output_dir: "projects/{project_name}/"
  filename_template: "nom.md"
  frontmatter:
    title_template: "Nested Object Matrix: {project_name}"
    tags: [nom, relationships]
  update_existing: true

collaboration_checkpoints:
  - id: "load-objects"
    prompt: "I found these objects from your discovery. Are we working with all of them, or should I focus on a subset?"
    type: user-review
    required: true
  - id: "nesting-draft"
    prompt: "Here's my initial NOM draft. For each nesting, does this match how users think about these objects?"
    type: user-review
    required: true
  - id: "edge-cases"
    prompt: "I noticed some objects that could nest in multiple places. Where do users expect to find them?"
    type: user-input
    required: true
  - id: "final-nom"
    prompt: "Here's the final NOM. Ready to save?"
    type: user-confirm
    required: true

inputs:
  - name: Validated Object List
    description: >
      The list of objects from Object Discovery (Step 1).
    required: true

outputs:
  - name: Nested Object Matrix
    description: >
      A matrix showing nesting relationships between all objects, saved
      to the project directory.
    artifact_type: page

procedure:
  - step: 1
    title: "Load Objects"
    instructions: >
      Read the object-discovery.md from the project directory. Present the
      full object list to the user. Ask if they want to work with all objects
      or a subset.
    checkpoint: "load-objects"
    timebox_minutes: 5
  - step: 2
    title: "Draft NOM"
    instructions: >
      For each object pair, determine if one contains the other. Consider:
      - Does Object A's detail page show a list of Object B?
      - Would Object B naturally "live inside" Object A's context?
      - Is this a true parent-child relationship, or just a reference?
    checkpoint: "nesting-draft"
    timebox_minutes: 15
  - step: 3
    title: "Resolve Edge Cases"
    instructions: >
      Identify objects that could nest in multiple parents. Discuss with
      the user where users would expect to find them.
    checkpoint: "edge-cases"
    timebox_minutes: 15
  - step: 4
    title: "Save NOM"
    instructions: >
      Present the final NOM and save it to the project directory.
    checkpoint: "final-nom"
    timebox_minutes: 5

definition_of_done:
  - "Every object pair has been considered for nesting"
  - "Multi-parent objects have a declared primary home"
  - "NOM is saved to the resource site"

system_prompt_file: SKILL.md
