id: "01-object-discovery"
title: "Object Discovery"
orca_round: discovery
orca_pillar: objects
orca_step: 1
version: "3.0.0"
description: >
  Collaboratively forage for nouns across user-provided research materials,
  brainstorm candidate object titles, and validate each one using the SIP test
  (Structure, Instances, Purpose). Reads existing Object Guides from the
  resource site and publishes the validated object list as a new page.
roles:
  - ux-designer
  - product-manager
  - engineer
difficulty: beginner
estimated_duration_minutes: 60
tags:
  - discovery
  - objects
  - noun-foraging
  - sip

sources:
  reads_from_site:
    - description: "See what objects already exist in the directory"
      path: "objects/"
      glob: "objects/*.md"
    - description: "Check for existing project work"
      path: "projects/"
  accepts_from_user:
    - type: file
      description: "PRDs, research docs, requirements, transcripts"
      required: false
    - type: url
      description: "Links to product pages, competitor sites, wikis"
      required: false
    - type: image
      description: "UI screenshots, wireframes, whiteboard photos"
      required: false
    - type: text
      description: "Pasted notes, interview excerpts, domain descriptions"
      required: true

publishing:
  output_dir: "projects/{project_name}/"
  filename_template: "object-discovery.md"
  frontmatter:
    title_template: "Object Discovery: {project_name}"
    tags: [discovery, objects]
  update_existing: true

collaboration_checkpoints:
  - id: "scope"
    prompt: "What product, feature, or system area are we discovering objects for?"
    type: user-input
    required: true
  - id: "materials"
    prompt: "What research materials do you have? (Share files, paste text, provide links, or describe what you have)"
    type: user-input
    required: true
  - id: "existing-objects"
    prompt: "I found these existing objects in your site. Which are relevant to your scope? Any I should ignore?"
    type: user-review
    required: true
  - id: "noun-review"
    prompt: "Here are all the nouns I extracted. Let's group and de-duplicate. Which clusters look right? Any I missed?"
    type: user-review
    required: true
  - id: "sip-validation"
    prompt: "Let's validate each candidate. For {object}: Does it have its own attributes? Can you name 2-3 instances? Why do users care about it?"
    type: user-confirm
    required: true
  - id: "final-list"
    prompt: "Here's the final validated object list. Ready to save it to the resource site?"
    type: user-confirm
    required: true

inputs:
  - name: Project Scope
    description: >
      A description of the product, feature, or system area being analyzed.
    required: true
  - name: Research Materials
    description: >
      Any existing research artifacts — personas, user interviews, requirements docs,
      competitive audits, existing UI screenshots, domain glossaries. Provide as
      files, links, images, or pasted text.
    required: true

outputs:
  - name: Validated Object List
    description: >
      A validated list of system objects, each with SIP confirmation, along with
      rejected nouns categorized as attributes, synonyms, or out-of-scope.
      Saved as a markdown page in the project directory.
    artifact_type: page

procedure:
  - step: 1
    title: "Read Existing Context"
    instructions: >
      Read existing Object Guides from site/docs/objects/ and any existing
      project work in site/docs/projects/. Build a picture of what objects
      are already documented.
    timebox_minutes: 5
  - step: 2
    title: "Scope the Discovery"
    instructions: >
      Ask the user what product or feature area they're exploring and what
      research materials they have available.
    checkpoint: "scope"
    timebox_minutes: 5
  - step: 3
    title: "Noun Foraging"
    instructions: >
      Read through all provided research materials and extract every noun.
      Don't filter yet — capture everything: people, places, things, concepts,
      documents, events.
    timebox_minutes: 15
    facilitation_tip: >
      Surface nouns from existing site pages the user may not have considered.
  - step: 4
    title: "Group and De-duplicate"
    instructions: >
      Cluster similar nouns together. Cross-reference with existing Object
      Guides to identify synonyms. Pick the clearest, most user-friendly
      title for each cluster.
    checkpoint: "noun-review"
    timebox_minutes: 10
  - step: 5
    title: "SIP Validation"
    instructions: >
      For each candidate noun, collaboratively apply the SIP test with the user.
      Ask them to confirm Structure, Instances, and Purpose for each one.
    checkpoint: "sip-validation"
    timebox_minutes: 20
  - step: 6
    title: "Save to Resource Site"
    instructions: >
      Present the final validated object list to the user for approval, then
      save it as a markdown file in the project directory.
    checkpoint: "final-list"
    timebox_minutes: 5

definition_of_done:
  - "Every candidate noun from foraging has been evaluated"
  - "Each confirmed object passes all three SIP criteria (Structure, Instances, Purpose)"
  - "Rejected nouns are categorized (attribute, synonym, out-of-scope) with rationale"
  - "No two objects are synonyms of each other (de-duplicated)"
  - "Object titles use clear, user-friendly language (not internal jargon)"
  - "Existing site objects have been considered and cross-referenced"
  - "The validated object list has been saved to the resource site"

system_prompt_file: SKILL.md
