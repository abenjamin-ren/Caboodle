id: "09-object-map"
title: "Object Map"
orca_round: design
orca_pillar: objects
orca_step: 9
version: "3.0.0"
description: >
  Create a visual Object Map showing the entire system's object architecture —
  objects, their nesting, relationships, and cardinality — as an ASCII/text
  diagram that can be translated into a visual artifact.
roles:
  - ux-designer
  - product-manager
  - engineer
difficulty: intermediate
estimated_duration_minutes: 45
tags:
  - design
  - objects
  - object-map
  - architecture

sources:
  reads_from_site:
    - description: "Read all project artifacts"
      path: "projects/"
      glob: "projects/{project_name}/*.md"
    - description: "Read Object Guides"
      path: "objects/"
      glob: "objects/*.md"
  accepts_from_user:
    - type: text
      description: "Additional architecture context"
      required: false

publishing:
  output_dir: "projects/{project_name}/"
  filename_template: "object-map.md"
  frontmatter:
    title_template: "Object Map: {project_name}"
    tags: [object-map, architecture]
  update_existing: true

collaboration_checkpoints:
  - id: "map-draft"
    prompt: "Here's a draft Object Map. Does this capture the system architecture correctly?"
    type: user-review
    required: true
  - id: "refinement"
    prompt: "Any relationships I missed? Any groupings that should change?"
    type: user-input
    required: true
  - id: "final-map"
    prompt: "Here's the final Object Map. Ready to save?"
    type: user-confirm
    required: true

inputs:
  - name: Project Artifacts
    description: "NOM, relationship lens, and object discovery artifacts"
    required: true

outputs:
  - name: Object Map
    description: "Visual architecture diagram of the system's objects and relationships"
    artifact_type: page

system_prompt_file: SKILL.md
