id: "11-cta-prioritization"
title: "CTA Prioritization"
orca_round: design
orca_pillar: ctas
orca_step: 11
version: "3.0.0"
description: >
  Prioritize CTAs across all objects using impact, effort, and frequency
  analysis. Produces a ranked backlog of actions to build.
roles:
  - ux-designer
  - product-manager
difficulty: intermediate
estimated_duration_minutes: 30
tags:
  - design
  - ctas
  - prioritization

sources:
  reads_from_site:
    - description: "Read CTA matrix and inventory"
      path: "projects/"
      glob: "projects/{project_name}/*.md"
  accepts_from_user:
    - type: text
      description: "Business priorities, launch constraints"
      required: false

publishing:
  output_dir: "projects/{project_name}/"
  filename_template: "cta-prioritization.md"
  frontmatter:
    title_template: "CTA Prioritization: {project_name}"
    tags: [ctas, prioritization]
  update_existing: true

collaboration_checkpoints:
  - id: "criteria"
    prompt: "What criteria matter most for prioritizing? Impact, effort, frequency, business value?"
    type: user-input
    required: true
  - id: "ranking-draft"
    prompt: "Here's my proposed ranking. Does this order match your instincts?"
    type: user-review
    required: true
  - id: "final-priorities"
    prompt: "Here's the final prioritized list. Ready to save?"
    type: user-confirm
    required: true

inputs:
  - name: CTA Matrix
    description: "CTA Matrix from step 7"
    required: true

outputs:
  - name: Prioritized CTA Backlog
    description: "Ranked list of CTAs with priority tiers"
    artifact_type: page

system_prompt_file: SKILL.md
