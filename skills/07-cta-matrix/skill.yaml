id: "07-cta-matrix"
title: "CTA Matrix"
orca_round: definition
orca_pillar: ctas
orca_step: 7
version: "3.0.0"
description: >
  Build a CTA Matrix mapping every object against every CTA, revealing
  gaps, redundancies, and priority actions. Includes priority weighting
  and role-based breakdowns.
roles:
  - ux-designer
  - product-manager
  - engineer
difficulty: intermediate
estimated_duration_minutes: 45
tags:
  - definition
  - ctas
  - matrix
  - prioritization

sources:
  reads_from_site:
    - description: "Read CTA inventory and object discovery"
      path: "projects/"
      glob: "projects/{project_name}/*.md"
    - description: "Read Object Guides"
      path: "objects/"
      glob: "objects/*.md"
  accepts_from_user:
    - type: text
      description: "Priority guidance, business goals"
      required: false

publishing:
  output_dir: "projects/{project_name}/"
  filename_template: "cta-matrix.md"
  frontmatter:
    title_template: "CTA Matrix: {project_name}"
    tags: [ctas, matrix]
  update_existing: true

collaboration_checkpoints:
  - id: "matrix-draft"
    prompt: "Here's the CTA matrix mapping objects to actions. Any cells I missed?"
    type: user-review
    required: true
  - id: "priority-review"
    prompt: "Let's prioritize. Which CTAs are must-have vs. nice-to-have for launch?"
    type: user-input
    required: true
  - id: "final-matrix"
    prompt: "Here's the prioritized CTA matrix. Ready to save?"
    type: user-confirm
    required: true

inputs:
  - name: CTA Inventory
    description: "CTAs from step 3"
    required: true
  - name: Object List
    description: "Validated objects"
    required: true

outputs:
  - name: CTA Matrix
    description: "Cross-referenced matrix of objects × CTAs with priorities"
    artifact_type: page

system_prompt_file: SKILL.md
