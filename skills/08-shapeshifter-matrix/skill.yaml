id: "08-shapeshifter-matrix"
title: "Shapeshifter Matrix"
orca_round: definition
orca_pillar: attributes
orca_step: 8
version: "3.0.0"
description: >
  Map how each object "shapeshifts" — appearing differently depending
  on context: list view, card view, detail view, inline mention, notification,
  search result, embedded preview. Defines which attributes surface where.
roles:
  - ux-designer
  - product-manager
difficulty: intermediate
estimated_duration_minutes: 45
tags:
  - definition
  - attributes
  - shapeshifter
  - ui-patterns

sources:
  reads_from_site:
    - description: "Read project attributes and Object Guides"
      path: "projects/"
      glob: "projects/{project_name}/*.md"
    - description: "Read Object Guides"
      path: "objects/"
      glob: "objects/*.md"
  accepts_from_user:
    - type: image
      description: "Screenshots of existing UIs showing the object in different views"
      required: false
    - type: text
      description: "Design context, view requirements"
      required: false

publishing:
  output_dir: "projects/{project_name}/"
  filename_template: "shapeshifter-matrix.md"
  frontmatter:
    title_template: "Shapeshifter Matrix: {project_name}"
    tags: [shapeshifter, attributes]
  update_existing: true

collaboration_checkpoints:
  - id: "contexts"
    prompt: "What contexts/views does this product have? (list, card, detail, notification, search, etc.)"
    type: user-input
    required: true
  - id: "shapeshifter-draft"
    prompt: "Here's how I think {object} appears in each context. Does this match your vision?"
    type: user-review
    required: true
  - id: "final-matrix"
    prompt: "Here's the complete Shapeshifter Matrix. Ready to save?"
    type: user-confirm
    required: true

inputs:
  - name: Attribute Map
    description: "Attributes from step 4"
    required: true

outputs:
  - name: Shapeshifter Matrix
    description: "Matrix showing attribute visibility per view context per object"
    artifact_type: page

system_prompt_file: SKILL.md
