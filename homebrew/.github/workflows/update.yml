name: Update Formula

on:
  repository_dispatch:
    types: [formula-update]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4

      - name: Update formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          URL="${{ github.event.client_payload.url }}"
          SHA256="${{ github.event.client_payload.sha256 }}"

          echo "Updating formula to ${VERSION}"
          echo "  URL: ${URL}"
          echo "  SHA256: ${SHA256}"

          # Update url line
          sed -i "s|url \"https://github.com/abenjamin-ren/Caboodle/archive/refs/tags/.*\"|url \"${URL}\"|" Formula/caboodle.rb

          # Update sha256 line
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/caboodle.rb

          cat Formula/caboodle.rb

      - name: Commit and push
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/caboodle.rb
          git commit -m "Update caboodle to ${VERSION}"
          git push
