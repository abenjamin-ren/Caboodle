<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caboodle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="page">
  <header class="page-header">
    <nav class="main-nav" aria-label="Primary">

      <!-- Left: logo + search -->
      <div class="nav-start">
        <a class="logo-link" href="/" aria-label="Caboodle home">
          <img src="caboodle-logo.svg" alt="Caboodle" height="40">
        </a>
        <button class="nav-search-trigger" type="button" aria-label="Search Caboodle">
          <span class="nav-search-label">
            <span class="material-icons" aria-hidden="true">search</span>
            <span>Search</span>
          </span>
          <kbd class="nav-hotkey">
            <span aria-hidden="true">⌘</span><span>K</span>
          </kbd>
        </button>
      </div>

      <!-- Right: nav tabs + profile -->
      <div class="nav-end">
        <ul class="nav-tabs">
          <li><a href="/" class="nav-tab" aria-current="page">Home</a></li>
          <li><a href="/objects" class="nav-tab">Object Library</a></li>
          <li><a href="/resources" class="nav-tab">Resources</a></li>
          <li><a href="/process" class="nav-tab">Process</a></li>
          <li><a href="/glossary" class="nav-tab">Glossary</a></li>
        </ul>
        <button class="nav-profile-btn" type="button" aria-label="User profile">AB</button>
      </div>

    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-content">
        <div class="hero-text">
          <h1 class="hero-headline">Caboodle</h1>
          <p class="hero-subheading">Structured tools and workflows for designing products around shared objects.</p>
        </div>
        <div class="hero-ctas">
          <a href="/objects" class="btn btn-primary">Browse the Object Library</a>
          <a href="/resources" class="btn btn-secondary">Download the Starter Kit <span class="material-icons" aria-hidden="true">chevron_right</span></a>
        </div>
      </div>
    </section>
  </main>

  <footer class="page-footer">
    <div class="center cluster" style="--justify: space-between">
      <span>&copy; 2026 Caboodle</span>
      <span>An OOUX resource site</span>
    </div>
  </footer>
</body>
</html>
